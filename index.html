<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VHS Retro App</title>
    <style>
        @font-face {
            font-family: 'VHS-Font';
            src: url('./vcr_osd.ttf') format('truetype');
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000; color: #fff;
            font-family: 'VHS-Font', 'Courier New', monospace;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* VHS Эффекты */
        .vhs-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; pointer-events: none;
        }
        .scanlines {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; z-index: 1;
        }
        #noise-layer {
            position: absolute; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUicGuS4/giphy.gif');
            opacity: 0.06; z-index: 2;
        }

        /* Экраны */
        .screen {
            display: none; height: 100vh; width: 100vw;
            flex-direction: column; align-items: center; justify-content: flex-start;
            position: absolute; top: 0; left: 0; padding: 40px 20px; box-sizing: border-box;
            background: #000;
        }
        .active-screen { display: flex; }
        
        #screen-help { padding: 0; justify-content: space-between; background: #111; }
        iframe { width: 100%; height: 82vh; border: none; background: #fff; }

        .menu-btn {
            border: 2px solid #fff; background: none; color: #fff;
            padding: 15px; margin: 10px; width: 90%;
            font-family: 'VHS-Font'; font-size: 1.1rem; cursor: pointer;
            text-align: left; text-transform: uppercase;
        }
        .menu-btn:active { background: #fff; color: #000; }

        .setting-row { margin: 15px; width: 90%; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { margin: 15px; color: #0ff; text-decoration: underline; cursor: pointer; text-transform: uppercase; font-size: 1.2rem; }

        h1 { font-size: 2.2rem; text-shadow: 2px 2px red; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="vhs-overlay">
        <div class="scanlines"></div>
        <div id="noise-layer"></div>
    </div>

    <div id="screen-menu" class="screen active-screen">
        <h1>VHS SYSTEM</h1>
        <button class="menu-btn" onclick="showScreen('screen-vhs')">01. ВИДЕОКАССЕТЫ</button>
        <button class="menu-btn" onclick="showScreen('screen-settings')">02. НАСТРОЙКИ</button>
        <button class="menu-btn" onclick="showScreen('screen-help')">03. ПОМОЩЬ</button>
    </div>

    <div id="screen-vhs" class="screen">
        <h1>CASSETTE</h1>
        <audio id="player" controls style="filter: invert(1); width: 90%; margin-top: 20px;">
            <source src="./music1.mp3" type="audio/mpeg">
        </audio>
        <div class="back-btn" onclick="showScreen('screen-menu')">НАЗАД</div>
    </div>

    <div id="screen-settings" class="screen">
        <h1>SETTINGS</h1>
        <div class="setting-row">
            <span>ШУМ</span>
            <input type="range" min="0" max="40" value="6" oninput="updateNoise(this.value)">
        </div>
        <div class="back-btn" onclick="showScreen('screen-menu')">ГОТОВО</div>
    </div>

    <div id="screen-help" class="screen">
        <div style="background: #000; width: 100%; padding: 10px; text-align: center;">ПОДДЕРЖКА</div>
        <iframe src="http://alexandrovsksupport.c6t.ru"></iframe>
        <div class="back-btn" onclick="showScreen('screen-menu')">ЗАКРЫТЬ</div>
    </div>

    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }
        function updateNoise(val) {
            document.getElementById('noise-layer').style.opacity = val / 100;
        }
    </script>
</body>
</html>
