<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: gap: content:;">
    <title>VHS Retro V1.0.2</title>
    <style>
        @font-face {
            font-family: 'VHS-Font';
            src: url('./vcr_osd.ttf') format('truetype');
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000; color: #fff;
            font-family: 'VHS-Font', monospace;
            overflow: hidden;
        }
        .vhs-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; pointer-events: none;
        }
        .scanlines {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
        }
        #noise-layer {
            position: absolute; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUicGuS4/giphy.gif');
            opacity: 0.05;
        }
        .screen {
            display: none; height: 100vh; width: 100vw;
            flex-direction: column; align-items: center; justify-content: flex-start;
            position: absolute; top: 0; left: 0; background: #000;
        }
        .active-screen { display: flex; }
        #screen-blue { background: #0000ff; justify-content: space-between; padding: 60px; box-sizing: border-box; }
        .osd-text { font-size: 3rem; text-shadow: 2px 2px #000; }
        .menu-btn {
            border: 2px solid #fff; background: none; color: #fff;
            padding: 15px; margin: 10px; width: 85%;
            font-family: 'VHS-Font'; font-size: 1.1rem; text-align: left;
        }
        .menu-btn:active { background: #fff; color: #000; }
        .version-tag { position: absolute; bottom: 20px; left: 20px; font-size: 0.8rem; opacity: 0.5; }
        video { width: 100%; height: auto; max-height: 70vh; background: #000; }
        iframe { width: 100%; height: 80vh; border: none; background: #fff; }
        .back-btn { margin: 20px; color: #0ff; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body id="main-body">
    <div class="vhs-overlay">
        <div class="scanlines"></div>
        <div id="noise-layer"></div>
    </div>
    <audio id="vhs-audio"><source src="./play.mp3" type="audio/mpeg"></audio>

    <div id="screen-start" class="screen active-screen" style="justify-content: center;">
        <button class="menu-btn" onclick="startApp()" style="text-align: center;">[ LOAD SYSTEM ]</button>
    </div>

    <div id="screen-blue" class="screen">
        <div class="osd-text">PLAY</div>
        <div style="width: 100%; display: flex; justify-content: space-between;">
            <div class="osd-text">SLP</div>
            <div class="osd-text">0:00:00</div>
        </div>
    </div>

    <div id="screen-menu" class="screen" style="padding-top: 50px;">
        <h1 style="text-shadow: 2px 2px red;">VHS SYSTEM</h1>
        <button class="menu-btn" onclick="showScreen('screen-video')">📼 ВИДЕОКАССЕТА</button>
        <button class="menu-btn" onclick="showScreen('screen-settings')">⚙️ НАСТРОЙКИ</button>
        <button class="menu-btn" onclick="showScreen('screen-help')">❓ ПОДДЕРЖКА</button>
        <div class="version-tag">V1.0.2</div>
    </div>

    <div id="screen-video" class="screen">
        <video id="vhs-video-player" controls playsinline>
            <source src="./archive_cassete.mp4" type="video/mp4">
        </video>
        <div class="back-btn" onclick="closeVideo()">НАЗАД</div>
    </div>

    <div id="screen-settings" class="screen" style="padding-top: 40px;">
        <h2>GRAPHICS</h2>
        <input type="range" min="0" max="100" value="15" style="width: 80%;" oninput="applyGraphics(this.value)">
        <div class="back-btn" onclick="showScreen('screen-menu')">OK</div>
    </div>

    <div id="screen-help" class="screen" style="padding: 0;">
        <iframe src="http://alexandrovsksupport.c6t.ru"></iframe>
        <div class="back-btn" onclick="showScreen('screen-menu')">ВЫХОД</div>
    </div>

    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }
        function startApp() {
            document.getElementById('vhs-audio').play();
            showScreen('screen-blue');
            setTimeout(() => { showScreen('screen-menu'); }, 3500);
        }
        function closeVideo() {
            const v = document.getElementById('vhs-video-player');
            v.pause();
            showScreen('screen-menu');
        }
        function applyGraphics(val) {
            const blurValue = val / 45;
            document.getElementById('main-body').style.filter = `blur(${blurValue}px) contrast(${1 + val/100})`;
        }
    </script>
</body>
</html>
